# Home Assistant local add-on manifest.
# Copy this whole `server/` folder to /addons/wardrobe_api/ on your HA machine,
# then install it from Settings -> Add-ons -> Add-on Store -> Local add-ons.
name: "Digital Wardrobe API"
version: "0.1.0"
slug: "wardrobe_api"
description: "Accounts + storage API for the Digital Wardrobe app, backed by your MariaDB add-on."
url: "https://github.com/Litemotions/digital-wardrobe"
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
init: false
# Exposes the API on the host so a Cloudflare Tunnel can reach it at
# http://<home-assistant-ip>:8080
ports:
  "8080/tcp": 8080
ports_description:
  "8080/tcp": "Wardrobe API — point your Cloudflare Tunnel at this port"
options:
  db_host: "core-mariadb"
  db_port: 3306
  db_name: "wardrobe"
  db_user: "wardrobe"
  db_password: ""
  jwt_secret: ""
  allowed_origins: "*"
schema:
  db_host: "str"
  db_port: "int"
  db_name: "str"
  db_user: "str"
  db_password: "str"
  jwt_secret: "str"
  allowed_origins: "str"
